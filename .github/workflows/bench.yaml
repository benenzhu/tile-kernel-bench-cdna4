name: Tilelang kernel bench

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: self-hosted
    timeout-minutes: 60
    env:
      # The runner is non-interactive; ~/.bashrc isn't sourced. Pin the venv
      # and ROCm onto PATH/LD_LIBRARY_PATH explicitly so `python`, `pip`, and
      # the ROCm runtime resolve the same way as the user's interactive shell.
      PATH: /opt/venv/bin:/opt/rocm/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rocm/lib
    steps:
      - name: Checkout bench repo
        uses: actions/checkout@v4

      - name: Build tilelang (editable)
        run: |
          cd /root/tilelang2
          PYTHONUNBUFFERED=1 VERBOSE=1 pip install -e . --no-deps --no-build-isolation -v

      - name: Smoke test (single shape)
        run: |
          python gemm/example_gemm.py

      - name: Run gemm bench sweep
        run: |
          cd gemm && python bench_gemm.py
