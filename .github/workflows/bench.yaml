name: Tilelang kernel bench

on:
  push:
    branches:
      - main  # only main pushes upload the baseline; feature pushes run via PR
  pull_request:  # any PR (any base) -- enables stacked PRs
  workflow_dispatch:

permissions:
  contents: read
  # Needed for `gh run list/download` to fetch the latest main run's CSV.
  actions: read
  # Needed for the sticky-pull-request-comment action to post bench results.
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: self-hosted
    timeout-minutes: 60
    env:
      # The runner is non-interactive; ~/.bashrc isn't sourced. Pin the venv
      # and ROCm onto PATH/LD_LIBRARY_PATH explicitly so `python`, `pip`, and
      # the ROCm runtime resolve the same way as the user's interactive shell.
      PATH: /opt/venv/bin:/opt/rocm/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rocm/lib
      # tilelang's CMake auto-selects CUDA otherwise; force the ROCm/HIP backend.
      USE_ROCM: "1"
      # TODO: remove when upstream tvm-ffi is fixed -- right now its torch
      # dlpack bridge can't resolve ROCm's dlpack and any kernel call dies
      # at TVMFFIPyArgSetterTorchFallback_. The cython execution backend
      # bypasses that path.
      TILELANG_EXECUTION_BACKEND: cython
      # Pin tilelang to a specific commit so bench numbers are reproducible
      # across runs and across PRs -- bumping this var is the only way to
      # change the compiler version used by CI.
      TILELANG_REPO: /root/tilelang2
      # HEAD of branch `feat/hip-resource-attrs` on the tilelang fork --
      # fetch from there if this SHA is no longer reachable from the local cache.
      TILELANG_COMMIT: 23be555ca90e421832018788348509d43552085d
    steps:
      - name: Checkout bench repo
        uses: actions/checkout@v4

      - name: Verify tilelang working tree is clean
        run: |
          cd "${TILELANG_REPO}"
          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "ERROR: ${TILELANG_REPO} has uncommitted changes; refusing to bench against a dirty tree."
            git status --short
            exit 1
          fi
          echo "Clean."

      - name: Pin tilelang to ${{ env.TILELANG_COMMIT }}
        run: |
          cd "${TILELANG_REPO}"
          # Make sure the pinned SHA is reachable; fetch all branches if not.
          if ! git cat-file -e "${TILELANG_COMMIT}^{commit}" 2>/dev/null; then
            echo "Commit not present locally -- fetching all refs."
            git fetch --all --tags --prune
          fi
          git checkout --detach "${TILELANG_COMMIT}"
          echo "Now at: $(git log -1 --oneline)"

      - name: Build tilelang (editable)
        run: |
          cd "${TILELANG_REPO}"
          USE_ROCM=ON PYTHONUNBUFFERED=1 VERBOSE=1 pip install -e . --no-deps --no-build-isolation -v

      - name: Smoke test (single shape)
        run: |
          python gemm/example_gemm.py

      - name: Show GPU info (amd-smi)
        run: |
          amd-smi || true

      - name: Run bench sweep (all ops)
        run: |
          python bench.py --output-csv /tmp/bench_current.csv

      # ----- baseline upload (push to main) --------------------------------
      # Every successful main run publishes its CSV as the "bench-baseline-main"
      # artifact. PRs download the most recent one and diff against it.

      - name: Upload baseline (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline-main
          path: /tmp/bench_current.csv
          retention-days: 90
          overwrite: true

      # ----- compare-to-main (PRs only) ------------------------------------
      # Fetch the most recent successful main run's bench-baseline-main
      # artifact via gh CLI (much faster than rebuilding+rerunning on main).
      # If no baseline exists yet, the compare step is skipped and a note is
      # printed instead of failing the PR.

      - name: Download main baseline CSV
        if: github.event_name == 'pull_request'
        id: download-baseline
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          rm -rf /tmp/baseline && mkdir -p /tmp/baseline
          RUN_ID=$(gh run list \
            --workflow "${{ github.workflow }}" \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -z "$RUN_ID" ]; then
            echo "No successful main run found yet -- skipping compare."
            exit 0
          fi
          echo "Baseline run: $RUN_ID"
          gh run download "$RUN_ID" -n bench-baseline-main -D /tmp/baseline
          ls -la /tmp/baseline/

      - name: Compare PR vs main baseline
        id: compare
        if: github.event_name == 'pull_request' && steps.download-baseline.outcome == 'success'
        # Don't fail the job here -- we want the comment posted even on
        # regression. A dedicated step at the end re-raises the failure.
        continue-on-error: true
        run: |
          if [ -f /tmp/baseline/bench_current.csv ]; then
            python compare_bench.py /tmp/baseline/bench_current.csv /tmp/bench_current.csv \
              --markdown /tmp/compare.md
          else
            echo "_Baseline CSV not present (likely the very first run on main has not yet completed). Skipping compare._" \
              > /tmp/compare.md
          fi

      - name: Build PR comment body
        if: github.event_name == 'pull_request' && steps.compare.conclusion != 'skipped'
        run: |
          # Each push posts a NEW comment (no sticky overwrite) -- empty
          # commits + workflow re-runs leave a history so you can tell
          # whether a regression is reproducible vs. flaky.
          sha="${{ github.event.pull_request.head.sha }}"
          short_sha="${sha:0:7}"
          {
            echo "## Bench results vs \`main\` (commit \`${short_sha}\`, run #${{ github.run_number }}.${{ github.run_attempt }})"
            echo ""
            cat /tmp/compare.md
            echo ""
            echo "_Self-hosted runner: \`${{ runner.name }}\` &middot; [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"
          } > /tmp/comment.md

      - name: Post comment to PR
        if: github.event_name == 'pull_request' && steps.compare.conclusion != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/comment.md

      - name: Re-fail job if compare regressed
        if: steps.compare.outcome == 'failure'
        run: |
          echo "compare_bench.py reported a regression -- failing the job."
          exit 1

      - name: Upload PR bench CSV
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bench-pr
          path: /tmp/bench_current.csv
          if-no-files-found: ignore
          retention-days: 14
